<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Administrador</title>
  <style>
    :root{
      --bg:#f4f7f0;
      --bg-top:#e8f5e9;
      --panel:#ffffff;
      --muted:#647a5a;
      --text:#1f3b1f;
      --accent:#d9a441;
      --border:rgba(113,140,96,.35);
      --danger:#c62828;
      --ok:#2e7d32;
      --input-bg:#f7fbf5;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(1200px 600px at 20% 0%, rgba(200,230,201,.8), transparent 60%),
        radial-gradient(900px 500px at 90% 0%, rgba(255,241,188,.7), transparent 55%),
        linear-gradient(to bottom, var(--bg-top), var(--bg));
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px 14px;
    }
    .card{
      width:min(520px, 100%);
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:16px;
      padding:18px;
      backdrop-filter: blur(6px);
    }
    h1{font-size:18px;margin:0}
    .subtitle{color:var(--muted);margin-top:6px;line-height:1.35}
    label{display:block;font-size:12px;color:var(--muted);margin:12px 0 6px}
    input{
      width:100%;
      padding:10px 10px;
      border-radius:10px;
      border:1px solid var(--border);
      background:var(--input-bg);
      color:var(--text);
      outline:none;
    }
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    button{
      border:1px solid rgba(0,0,0,0.03);
      background:rgba(217,164,65,.12);
      border-color:rgba(206,161,64,1);
      color:var(--text);
      padding:10px 12px;
      border-radius:10px;
      cursor:pointer;
      font-weight:700;
    }
    button.ghost{background:transparent;border-color:var(--border);font-weight:600}
    .msg{margin-top:12px;color:var(--muted);font-size:13px;line-height:1.35}
    .msg.ok{color:var(--ok)}
    .msg.err{color:var(--danger)}
    .kbd{font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size:12px; padding:2px 6px; border:1px solid var(--border); border-radius:8px; color:var(--muted); background:#f2f7ed}
    .note{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}
  </style>
</head>
<body>
  <div class="card">
    <h1>Inicio de sesión — Administrador</h1>
    <div class="subtitle">
      Solo el <b>administrador</b> puede acceder al registro de eventos en la cadena de bloques.
      El cliente <b>no</b> inicia sesión: escanea el código QR y ve la trazabilidad en <span class="kbd">Trazabilidad.html</span>.
    </div>

    <form id="form">
      <label for="password">Contraseña de administrador</label>
      <input id="password" type="password" placeholder="Contraseña" autocomplete="current-password" required />

      <div class="actions">
        <button type="submit" id="btnLogin">Entrar al panel</button>
        <button type="button" class="ghost" id="btnSet">Cambiar contraseña</button>
      </div>
      <div class="msg" id="msg"></div>
    </form>
    <div class="note">
      La primera vez se crea una contraseña demo; cámbiala con «Cambiar contraseña».
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);

    const STORAGE_ADMIN_HASH = "aguacate_admin_password_hash_v1";
    /** Sesión solo en esta pestaña (se cierra al cerrar el navegador) */
    const STORAGE_ADMIN_SESSION = "aguacate_admin_session_v2";
    const SESSION_TTL_MS = 8 * 60 * 60 * 1000;

    function sha256(text) {
      return CryptoJS.SHA256(String(text)).toString();
    }

    function setMsg(text, kind = "") {
      const el = $("msg");
      el.className = "msg" + (kind ? " " + kind : "");
      el.textContent = text || "";
    }

    function isSessionValid() {
      try {
        const raw = sessionStorage.getItem(STORAGE_ADMIN_SESSION);
        if (!raw) return false;
        const s = JSON.parse(raw);
        if (!s || !s.createdAt) return false;
        return (Date.now() - Number(s.createdAt)) < SESSION_TTL_MS;
      } catch {
        return false;
      }
    }

    function setSession() {
      sessionStorage.setItem(STORAGE_ADMIN_SESSION, JSON.stringify({ createdAt: Date.now() }));
    }

    function getPasswordHash() {
      return localStorage.getItem(STORAGE_ADMIN_HASH);
    }

    function setPasswordHash(hash) {
      localStorage.setItem(STORAGE_ADMIN_HASH, hash);
    }

    function ensurePasswordConfigured() {
      const existing = getPasswordHash();
      if (existing) return;
      setPasswordHash(sha256("admin123"));
      setMsg("Contraseña inicial (demo): admin123. Cámbiala con «Cambiar contraseña».", "");
    }

    function goPanel() {
      window.location.href = "index.html";
    }

    /* Limpia sesión antigua en localStorage (ya no se usa) */
    try {
      localStorage.removeItem("aguacate_admin_session_v1");
    } catch (_) {}

    /* No redirigir automático: siempre verás el login al abrir login.html */

    ensurePasswordConfigured();

    $("form").addEventListener("submit", (e) => {
      e.preventDefault();
      const pass = $("password").value;
      const expected = getPasswordHash();
      if (!expected) {
        setMsg("No hay contraseña configurada. Usa «Cambiar contraseña».", "err");
        return;
      }
      if (sha256(pass) !== expected) {
        setMsg("Contraseña incorrecta.", "err");
        return;
      }
      setSession();
      setMsg("Acceso concedido…", "ok");
      setTimeout(goPanel, 350);
    });

    $("btnSet").addEventListener("click", () => {
      const newPass = prompt("Nueva contraseña (mínimo 6 caracteres):");
      if (newPass == null) return;
      if (String(newPass).trim().length < 6) {
        setMsg("La contraseña debe tener al menos 6 caracteres.", "err");
        return;
      }
      setPasswordHash(sha256(newPass));
      setMsg("Contraseña actualizada. Ya puedes iniciar sesión.", "ok");
      $("password").value = "";
    });
  </script>
</body>
</html>
